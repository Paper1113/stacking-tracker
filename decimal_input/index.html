<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }
      input {
        width: 100%;
        height: 50px;
        font-size: 20px;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: #f9f9f9;
        -webkit-appearance: none;
      }
      input:focus {
        outline: 2px solid #ff4b4b;
        border-color: transparent;
      }
    </style>
  </head>
  <body>
    <!-- <label> is handled by Streamlit Python side for translation -->
    <input 
      type="text" 
      inputmode="decimal" 
      pattern="[0-9]*[.]?[0-9]*" 
      placeholder="0.000" 
      id="num_input">

    <!-- Official Streamlit Component Library JS from CDN -->
    <script>
      function sendMessageToStreamlitClient(type, data) {
        var outData = Object.assign({
          isStreamlitMessage: true,
          type: type,
        }, data);
        window.parent.postMessage(outData, "*");
      }

      function onRender(event) {
        // Not strictly needed for this, but could update label
        sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: document.body.scrollHeight });
      }

      // Tell Streamlit we are ready
      sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });
      
      // Initial height
      setTimeout(function() {
          sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: document.body.scrollHeight });
      }, 0);

      window.addEventListener("message", function(event) {
        if (event.data.type === "streamlit:render") {
          onRender(event.data);
          
          // Clear the input if the key changed
          // Since we can't easily detect a totally new component vs redraw,
          // we rely on Streamlit's key. If Streamlit changes the key, the iframe reloads entirely.
        }
      });

      const input = document.getElementById("num_input");
      input.addEventListener("input", function() {
          // ensure it's only digits and max 1 dot
          this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');
          
          let val = null;
          if (this.value) {
            val = parseFloat(this.value);
            if (isNaN(val)) val = null;
          }
          
          sendMessageToStreamlitClient("streamlit:setComponentValue", { value: val });
      });
    </script>
  </body>
</html>
